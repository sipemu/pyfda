name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "python/**"
      - "mkdocs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install mkdocs-material
      - name: Build and deploy
        run: mkdocs gh-deploy --force
